# app.conf — AWS Security Lab detections & dashboards app
#
# Packages Phase 4 (docs/PLAN.md) content: the 8 detection alerts from
# docs/DETECTIONS.md, the SOC Overview dashboard, and the investigation
# drilldown dashboard. Deployed as a proper Splunk app (rather than files
# dropped into system/local) so it's versioned, reviewable, and
# reproducible on a fresh container — see splunk/phase4-detections-setup.md.

[install]
is_configured = 0

[ui]
is_visible = true
label = AWS Security Lab — Detections

[launcher]
author = Robert Noord Jr
description = Phase 4 detections, alerts, and dashboards for the AWS Splunk Security Lab (docs/DETECTIONS.md).
version = 1.0.0

[package]
id = aws_security_lab
