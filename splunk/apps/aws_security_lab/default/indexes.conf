# indexes.conf — Phase 4 summary index
#
# The 4 Phase 2 raw-log indexes (aws_cloudtrail, aws_vpcflow, aws_security,
# aws_waf) already exist per docs/ARCHITECTURE.md §3 / splunk/README.md and
# are NOT redefined here. This stanza adds the one new index Phase 4
# introduces: a small summary index that the 8 detection alerts in
# savedsearches.conf write their hits into (via the `summary_index` alert
# action), which feeds the SOC Overview dashboard's detection-hit timeline
# panel.
#
# Retention is short relative to the raw-log indexes -- this holds alert
# metadata (which detection fired, when, on what entity), not raw events,
# so 90 days is plenty for trend/portfolio purposes without meaningful
# storage cost.

[summary_detections]
homePath = $SPLUNK_DB/summary_detections/db
coldPath = $SPLUNK_DB/summary_detections/colddb
thawedPath = $SPLUNK_DB/summary_detections/thaweddb
frozenTimePeriodInSecs = 7776000
maxTotalDataSizeMB = 2048
