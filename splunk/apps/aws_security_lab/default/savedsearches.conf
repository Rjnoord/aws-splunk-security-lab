# savedsearches.conf — Phase 4 detection alerts
#
# Source of truth for the SPL is docs/DETECTIONS.md — searches below are
# copied verbatim from there (D1-D8) and converted to scheduled alerts.
# Do not hand-edit SPL here without updating DETECTIONS.md to match.
#
# Common conventions applied to every stanza:
#   - alert_type            = number of events
#   - alert_comparator      = greater than
#   - alert_threshold       = 0            (fire on any result)
#   - alert.suppress        = 1, throttled by the entity field(s) that
#                             fully match that detection's own grouping
#                             key (arn / src+dst IP / awsRegion / finding
#                             title, sometimes combined), so a noisy
#                             user or host doesn't spam the same alert
#                             every run without swallowing distinct
#                             entities.
#   - alert.severity        1 (informational) .. 5 (critical), reflecting
#                             the risk framing in docs/DETECTIONS.md.
#   - dispatch.earliest_time / latest_time are set to match each search's
#     own cron interval (rt-ish "since last run" windows), so re-running
#     doesn't re-flag events already alerted on in the prior window.
#
# Email routing (per the routing decision in the Phase 4 build task):
#   action.email = 1  -> D1 (root usage), D4 (CloudTrail tampering),
#                         D5 (GuardDuty high-sev), D7 (public S3)
#   no email          -> D2, D3, D6, D8 (scheduled + dashboard-visible only)
#
# `action.email.to = $email$` is a PLACEHOLDER TOKEN, not a real address.
# Fill it in (or override) via a local/savedsearches.conf stanza on the
# deployed instance -- see splunk/phase4-detections-setup.md for the
# default/local override convention. Splunk will not send mail until:
#   (a) action.email.to is set to a real address, AND
#   (b) SMTP is configured in Splunk Web under
#       Settings -> Server Settings -> Email Settings
# Neither of those is done in this file -- no SMTP credentials belong in
# version control.
#
# Data availability note: D5 (index=aws_security, GuardDuty findings) and
# D8 (index=aws_vpcflow, VPC Flow Logs) will return zero results until
# Phase 3 Pattern B and VPC Flow Log delivery are enabled, respectively
# (see docs/PLAN.md Phase 3 notes -- both are currently deferred/unchecked).
# The alerts are correctly configured now and will start firing the
# moment that data lands in those indexes -- nothing further to do here.
#
# All 8 alerts also write to the `summary_detections` summary index
# (see indexes.conf) via the `summary_index` alert action, feeding the
# SOC Overview dashboard's detection-hit timeline panel.

###############################################################################
# D1 — Root account usage
###############################################################################
[D1 - Root Account Usage]
search = index=aws_cloudtrail userIdentity.type=Root eventName!=ConsoleLogin OR (eventName=ConsoleLogin responseElements.ConsoleLogin=Success) | stats count min(_time) as first max(_time) as last values(eventName) as actions by sourceIPAddress awsRegion | convert ctime(first) ctime(last)
description = Root account was used for any action other than a failed console login. Root should never be used operationally (PCI/SOC 2 finding). ATT&CK T1078.004.
cron_schedule = */10 * * * *
dispatch.earliest_time = -10m
dispatch.latest_time = now
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.suppress = 1
alert.suppress.period = 30m
alert.suppress.fields = sourceIPAddress,awsRegion
alert.severity = 5
counttype = number of events
relation = greater than
quantity = 0
action.email = 1
action.email.to = $email$
action.email.subject = [AWS Security Lab] D1 - Root account activity detected
action.summary_index = 1
action.summary_index._name = summary_detections
action.summary_index.detection_id = D1
disabled = 0

###############################################################################
# D2 — Console login without MFA
###############################################################################
[D2 - Console Login Without MFA]
search = index=aws_cloudtrail eventName=ConsoleLogin | search additionalEventData.MFAUsed=No responseElements.ConsoleLogin=Success | stats count values(sourceIPAddress) as src by userIdentity.userName
description = Successful console login where MFA was not used. Credential compromise / MFA bypass risk. ATT&CK T1078.
cron_schedule = */15 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.suppress = 1
alert.suppress.period = 1h
alert.suppress.fields = userIdentity.userName
alert.severity = 3
counttype = number of events
relation = greater than
quantity = 0
action.email = 0
action.summary_index = 1
action.summary_index._name = summary_detections
action.summary_index.detection_id = D2
disabled = 0

###############################################################################
# D3 — IAM policy / privilege escalation activity
###############################################################################
[D3 - IAM Privilege Escalation Activity]
search = index=aws_cloudtrail (eventName=AttachUserPolicy OR eventName=PutUserPolicy OR eventName=CreatePolicyVersion OR eventName=AttachRolePolicy OR eventName=CreateAccessKey OR eventName=UpdateAssumeRolePolicy) | table _time userIdentity.arn eventName requestParameters.policyArn sourceIPAddress | sort - _time
description = IAM policy/permissions changes consistent with privilege escalation. Enrich with an admin allowlist lookup before tuning thresholds. ATT&CK T1098, T1548.
cron_schedule = */15 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.suppress = 1
alert.suppress.period = 30m
alert.suppress.fields = userIdentity.arn
alert.severity = 4
counttype = number of events
relation = greater than
quantity = 0
action.email = 0
action.summary_index = 1
action.summary_index._name = summary_detections
action.summary_index.detection_id = D3
disabled = 0

###############################################################################
# D4 — CloudTrail tampering (defense evasion) — highest priority
###############################################################################
[D4 - CloudTrail Tampering]
search = index=aws_cloudtrail (eventName=StopLogging OR eventName=DeleteTrail OR eventName=UpdateTrail OR eventName=PutEventSelectors) | stats count by _time userIdentity.arn eventName requestParameters.name sourceIPAddress
description = Attempt to disable, delete, or tamper with CloudTrail logging -- defense evasion, T1562.001 Impair Defenses. Highest-priority alert: if logging stops, this is often the last event the SOC will see. Most frequent schedule of the 8 detections on purpose.
cron_schedule = */5 * * * *
dispatch.earliest_time = -5m
dispatch.latest_time = now
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.suppress = 1
alert.suppress.period = 15m
alert.suppress.fields = userIdentity.arn,eventName,requestParameters.name,sourceIPAddress
alert.severity = 5
counttype = number of events
relation = greater than
quantity = 0
action.email = 1
action.email.to = $email$
action.email.subject = [AWS Security Lab] D4 - CRITICAL: CloudTrail tampering detected
action.summary_index = 1
action.summary_index._name = summary_detections
action.summary_index.detection_id = D4
disabled = 0

###############################################################################
# D5 — GuardDuty high-severity finding
###############################################################################
[D5 - GuardDuty High-Severity Finding]
search = index=aws_security source=*guardduty* severity>=7 | table _time title severity type resource.instanceDetails.instanceId service.action.actionType region | sort - severity
description = Managed-threat-intel hit from GuardDuty at severity 7+. NOTE - index=aws_security won't have real GuardDuty findings until Phase 3 Pattern B (EventBridge -> Firehose -> HEC) is enabled; this alert is correctly configured and will fire once that pipeline is live.
cron_schedule = */10 * * * *
dispatch.earliest_time = -10m
dispatch.latest_time = now
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.suppress = 1
alert.suppress.period = 30m
alert.suppress.fields = title
alert.severity = 5
counttype = number of events
relation = greater than
quantity = 0
action.email = 1
action.email.to = $email$
action.email.subject = [AWS Security Lab] D5 - GuardDuty high-severity finding
action.summary_index = 1
action.summary_index._name = summary_detections
action.summary_index.detection_id = D5
disabled = 0

###############################################################################
# D6 — API activity from an unusual region
###############################################################################
[D6 - Unusual Region Activity]
search = index=aws_cloudtrail | stats count by awsRegion userIdentity.arn | eventstats sum(count) as total by userIdentity.arn | eval pct=round(count/total*100,2) | where awsRegion!="us-east-1" AND pct<5
description = Principal made API calls from a region that is not part of its normal baseline (<5%% of its total activity). Account-takeover activity often originates from a new region. ATT&CK T1535. Needs a wider window than the other detections to build a meaningful per-principal baseline.
cron_schedule = */30 * * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.suppress = 1
alert.suppress.period = 2h
alert.suppress.fields = userIdentity.arn,awsRegion
alert.severity = 3
counttype = number of events
relation = greater than
quantity = 0
action.email = 0
action.summary_index = 1
action.summary_index._name = summary_detections
action.summary_index.detection_id = D6
disabled = 0

###############################################################################
# D7 — S3 bucket made public (data exposure)
###############################################################################
[D7 - S3 Bucket Made Public]
search = index=aws_cloudtrail (eventName=PutBucketPolicy OR eventName=PutBucketAcl OR eventName=PutBucketPublicAccessBlock OR eventName=DeletePublicAccessBlock) | search requestParameters.*=*AllUsers* OR requestParameters.publicAccessBlockConfiguration.blockPublicAcls=false | table _time userIdentity.arn eventName requestParameters.bucketName sourceIPAddress
description = A bucket policy/ACL/public-access-block change consistent with making an S3 bucket public. Cardholder/customer data exposure risk. ATT&CK T1530.
cron_schedule = */10 * * * *
dispatch.earliest_time = -10m
dispatch.latest_time = now
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.suppress = 1
alert.suppress.period = 30m
alert.suppress.fields = userIdentity.arn,requestParameters.bucketName
alert.severity = 5
counttype = number of events
relation = greater than
quantity = 0
action.email = 1
action.email.to = $email$
action.email.subject = [AWS Security Lab] D7 - S3 bucket made public
action.summary_index = 1
action.summary_index._name = summary_detections
action.summary_index.detection_id = D7
disabled = 0

###############################################################################
# D8 — Potential data exfiltration signal
###############################################################################
[D8 - Potential Data Exfiltration Signal]
search = index=aws_vpcflow action=ACCEPT | stats sum(bytes) as total_bytes by src_ip dst_ip | where total_bytes > 1073741824 | eval GB=round(total_bytes/1024/1024/1024,2) | sort - GB
description = Bulk read / large egress signal (>1GB in the window) between a src/dst pair. Combine with CloudTrail GetObject/SelectObjectContent spikes for higher fidelity (future enhancement). ATT&CK T1537, T1567. NOTE - index=aws_vpcflow won't have real data until VPC Flow Log delivery is enabled (docs/PLAN.md Phase 1/3); this alert is correctly configured and will fire once that data flows.
cron_schedule = */15 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.suppress = 1
alert.suppress.period = 30m
alert.suppress.fields = src_ip,dst_ip
alert.severity = 4
counttype = number of events
relation = greater than
quantity = 0
action.email = 0
action.summary_index = 1
action.summary_index._name = summary_detections
action.summary_index.detection_id = D8
disabled = 0
